version: '3.8'

services:
  # 1. Servicio de Base de Datos
  attendance-db:
    image: postgres:15
    container_name: attendance-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: attendance_db
    ports:
      - "5433:5432" # Mapeo externo para tu desarrollo local
    volumes:
      - attendance-data:/var/lib/postgresql/data
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Tu Aplicación Spring Boot (attendance-service)
  attendance-api:
    build: .
    container_name: attendance-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # Sobreescribimos la URL para que use el nombre del servicio 'attendance-db'
      - SPRING_DATASOURCE_URL=jdbc:postgresql://attendance-db:5432/attendance_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      attendance-db:
        condition: service_healthy # Espera a que la DB esté lista
    networks:
      - attendance-network

networks:
  attendance-network:
    driver: bridge

volumes:
  attendance-data:
